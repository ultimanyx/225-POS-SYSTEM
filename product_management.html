<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Management</title>
    <link rel="stylesheet" href="/CSS/style.css" />
  </head>
  <body>
    <div class="sidebar">
      <h2>W&A Inventory</h2>
      <ul>
        <a href="pos.html"><li>POS</li></a>
        <a href="product_management.html"><li>Product Management</li></a>
        <a href="stocks.html"><li>Stock</li></a>
        <a href="reports.html"><li>Reports</li></a>

        <li
          id="logout-btn"
          style="margin-top: auto; color: #e74c3c; font-weight: bold"
        >
          Logout
        </li>
      </ul>
    </div>
    <div class="main-content">
      <header>
        <h1>Product Management</h1>
      </header>

      <section class="product-table">
        <h3>Manage Products</h3>

        <table>
          <thead>
            <tr>
              <th>Product Name</th>
              <th>Category</th>
              <th>Price (₱)</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Milk</td>
              <td>Dairy</td>
              <td><input type="number" value="50" /></td>
              <td><button class="save-btn">Save</button></td>
            </tr>

            <tr>
              <td>Bread</td>
              <td>Bakery</td>
              <td><input type="number" value="30" /></td>
              <td><button class="save-btn">Save</button></td>
            </tr>

            <tr>
              <td>Eggs</td>
              <td>Poultry</td>
              <td><input type="number" value="120" /></td>
              <td><button class="save-btn">Save</button></td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
  </body>
</html>
