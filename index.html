<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - W&A Inventory</title>
    <style>
        /* ================= GLOBAL STYLES ================= */
        :root {
            --primary-green: #27ae60;
            --dark-green: #1e8449;
            --text-main: #2c3e50;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= LAYOUT WRAPPER ================= */
        .login-wrapper {
            display: flex;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* LEFT SIDE: BRANDING */
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .brand-content h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .brand-content p {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 300;
        }

        /* RIGHT SIDE: FORM */
        .login-right {
            flex: 1.2;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .card-header {
            margin-bottom: 35px;
        }

        .login-card h2 {
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ================= FORM ELEMENTS ================= */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        /* REMEMBER ME & FORGOT PASS */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }

        .forgot-pass {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-login:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.3);
        }

        /* FOOTER */
        .footer-text {
            margin-top: 35px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 700;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            min-height: 20px;
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .login-wrapper { flex-direction: column; height: auto; max-width: 450px; }
            .login-left { padding: 50px 20px; }
            .login-right { padding: 40px 30px; }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-left">
            <div class="brand-content">
                <img src="/Image/Logo.png" alt="Logo" class="logo" />
                <h1>W&A</h1>
                <p>Fresh and Frozen Products Inventory</p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-card">
                <div class="card-header">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Log in to manage your inventory</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required placeholder="e.g. admin_wa" />
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••" />
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-pass">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-login">Sign In</button>
                </form>

                <div class="footer-text">
                    <p>New here? <a href="CreateAcc.html">Create Account</a></p>
                </div>
                
                <p id="message"></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Pugngan ang page reload

            // 1. Kuhaon ang data gikan sa form
            const inputUser = document.getElementById('username').value;
            const inputPass = document.getElementById('password').value;
            const message = document.getElementById('message');

            // 2. Kuhaon ang data nga gi-save gikan sa CreateAcc.html
            const storedUser = localStorage.getItem('savedUsername');
            const storedPass = localStorage.getItem('savedPassword');

            // 3. I-check kung ni-match (O kung ang default admin/admin)
            if ((inputUser === storedUser && inputPass === storedPass) || (inputUser === "admin" && inputPass === "admin")) {
                message.style.color = "#27ae60";
                message.textContent = "Login Successful! Redirecting...";
                
                // Balhin sa dashboard human ang 1 second
                setTimeout(() => {
                    window.location.href = "dashboard.html"; 
                }, 1000);
            } else {
                // Kung sayop
                message.style.color = "#e74c3c";
                message.textContent = "Invalid Username or Password!";
            }
        });
    </script>
</body>
</html>
