<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - W&A Inventory</title>
    <!-- Bootstrap 4 CSS -->
    <link rel="stylesheet" href="bootstrap-4.6.2-dist/css/bootstrap.min.css" />
    <style>
        :root {
            --brand-magenta: #E91E8C;
            --brand-magenta-light: #F74FA8;
            --brand-magenta-dark: #C9177A;
            --brand-green: #22C55E;
            --brand-green-light: #4ADE80;
            --brand-green-dark: #16A34A;
            --brand-red: #E63946;
            --brand-red-light: #F15D68;
            --brand-red-dark: #C92A35;
            --brand-blue: #5DADE2;
            --brand-blue-light: #7EC0E8;
            --brand-blue-dark: #3D93C9;
            --primary-green: var(--brand-green);
            --dark-green: var(--brand-green-dark);
            --text-main: #212121;
            --text-muted: #616161;
            --border-color: var(--brand-blue-light);
            --bg-light: #F5F5F5;
            --white: #FFFFFF;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        * {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================= LAYOUT WRAPPER ================= */
        .login-wrapper {
            width: 90%;
            max-width: 1000px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .login-wrapper .row {
            margin: 0;
            min-height: 600px;
        }

        /* LEFT SIDE: BRANDING */
        .login-left {
            background: linear-gradient(135deg, var(--brand-magenta) 0%, var(--brand-magenta-dark) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .brand-content h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }


        .brand-content p {
            font-size: 1.2rem;
            opacity: 0.8;
            font-weight: 300;
            font-weight: none;
        }

        /* RIGHT SIDE: FORM */
        .login-right {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .card-header {
            margin-bottom: 35px;
            background: transparent;
            border-bottom: none;
            padding: 0;
        }

        .login-card h2 {
            color: var(--text-main);
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* ================= FORM ELEMENTS ================= */
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .form-control {
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #fcfcfc;
            height: auto;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
        }

        .custom-checkbox .custom-control-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
        }

        .custom-checkbox .custom-control-input:checked ~ .custom-control-label::before {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        /* FORGOT PASS */
        .forgot-pass {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .forgot-pass:hover {
            text-decoration: underline;
            color: var(--dark-green);
        }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .btn-login:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(34, 197, 94, 0.3);
            color: white;
        }

        /* FOOTER */
        .footer-text {
            margin-top: 35px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text a:hover {
            color: var(--dark-green);
        }


        /* ================= RESPONSIVE ================= */
        @media (max-width: 768px) {
            .login-wrapper .row {
                min-height: auto;
            }
            .login-left {
                padding: 50px 20px;
            }
            .login-right {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="row w-100">
            <!-- LEFT SIDE: BRANDING -->
            <div class="col-md-5 login-left">
                <div class="brand-content">
                    <img src="/Image/Logo.png" alt="Logo" class="logo" />
                    <h1>W&A</h1>
                    <p>Fresh and Frozen Products </p>
                </div>
            </div>

            <!-- RIGHT SIDE: FORM -->
            <div class="col-md-7 login-right">
                <div class="login-card">
                    <div class="card-header">
                        <h2>Welcome Back</h2>
                        <p class="subtitle">Log in to manage your POS system efficiently.</p>
                    </div>

                    <form action="dashboard.html" method="GET">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" required placeholder="e.g. admin_wa" />
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" required placeholder="••••••••" />
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="custom-control custom-checkbox">
                                <input type="checkbox" class="custom-control-input" id="rememberMe">
                                <label class="custom-control-label" for="rememberMe">Remember me</label>
                            </div>
                            <!-- <a href="#" class="forgot-pass">Forgot password?</a> -->
                        </div>

                        <button type="submit" class="btn btn-login">Sign In</button>
                    </form>
                </div>
                
            </div>
            </form>
        </div>
    </div>

</body>
</html>
